services:
  postgres:
    image: postgres:16-alpine
    container_name: kid-schedule-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kid_schedule
      POSTGRES_USER: kid_schedule
      POSTGRES_PASSWORD: kid_schedule
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kid_schedule -d kid_schedule"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kid-schedule-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
