spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kid_schedule}
    username: ${DB_USERNAME:kid_schedule}
    password: ${DB_PASSWORD:kid_schedule}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-key-at-least-32-chars}
  oauth:
    kakao:
      rest-api-key: ${KAKAO_REST_API_KEY:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uris: ${KAKAO_REDIRECT_URIS:http://192.168.45.142:8080/api/v1/auth/kakao/redirect,http://localhost:8080/api/v1/auth/kakao/redirect}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      redirect-uris: ${NAVER_REDIRECT_URIS:http://192.168.45.142:8080/api/v1/auth/naver/redirect,http://localhost:8080/api/v1/auth/naver/redirect}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uris: ${GOOGLE_REDIRECT_URIS:http://192.168.45.142:8080/api/v1/auth/google/redirect,http://localhost:8080/api/v1/auth/google/redirect}
