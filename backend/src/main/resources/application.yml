spring:
  application:
    name: kid-schedule-api
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  invite:
    code-length: 8
    ttl-hours: 24
  jwt:
    secret: ${JWT_SECRET:change-me-use-at-least-32-characters-secret-key}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
  oauth:
    kakao:
      rest-api-key: ${KAKAO_REST_API_KEY:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uris: ${KAKAO_REDIRECT_URIS:http://localhost:8080/api/v1/auth/kakao/redirect}
