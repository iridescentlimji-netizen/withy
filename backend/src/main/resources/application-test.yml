spring:
  config:
    activate:
      on-profile: test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:kid_schedule_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: test-jwt-secret-key-at-least-32-characters-long
  oauth:
    security:
      allowed-exp-hosts: 127.0.0.1,localhost
    kakao:
      rest-api-key: test-kakao-key
      redirect-uris: http://localhost:8080/api/v1/auth/kakao/redirect
    naver:
      client-id: test-naver-id
      client-secret: test-naver-secret
      redirect-uris: http://localhost:8080/api/v1/auth/naver/redirect
    google:
      client-id: test-google-id
      client-secret: test-google-secret
      redirect-uris: http://localhost:8080/api/v1/auth/google/redirect
